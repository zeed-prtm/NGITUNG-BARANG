<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warung</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1 id="judul">WARUNG</h1>

    <div class="pesan">
        <form action="">
            <b><label for="barang" style="font-size: large;">daftar barang</label></b>
            <br>

            <select name="barang" id="barang">
                <optgroup label="Weapon Class 1">
                    <option value="p50" selected data-price="2.500">p50</option>
                    <option value="ceramic" data-price="6.000">ceramic</option>
                    <option value="X17" data-price="34.000">X17</option>
                </optgroup> 

                <optgroup label="Weapon Class 2">
                    <option value="tec9" data-price="7.500">tec9</option>
                    <option value="Mini_SMG" data-price="10.000">Mini SMG</option>
                    <option value="Micro_SMG" data-price="10.000">Micro SMG</option>
                    <option value="SMG" data-price="40.000">SMG</option>
                    <option value="KVR" data-price="80.000">KVR</option>
                </optgroup>

                <optgroup label="Weapon Class 3">
                    <option value="shotgun" data-price="67.000">shotgun</option>
                    <option value="revolver" data-price="73.000">revolver</option>
                    <option value="black_revolver" data-price="93.000">black revolver</option>
                    <option value="Rifle_AKM" data-price="230.000">Rifle AKM</option>
                    <option value="virtus" data-price="230.000">Rifle virtus</option>
                </optgroup>

                <optgroup label="Ammo">
                    <option value=".50" data-price="500">ammo .50</option>
                    <option value="9mm" data-price="1.500">ammo 9mm</option>
                    <option value=".45" data-price="6.000">ammo .45</option>
                    <option value=".44" data-price="7.000">ammo .44</option>
                    <option value="SG" data-price="6.000">ammo SG</option>
                    <option value=".556" data-price="7.000">ammo .556</option>
                    <option value=".762" data-price="7.000">ammo .762</option>
                </optgroup>

                <optgroup label="vest">
                    <option value="blue_vest" data-price="3000">blue vest</option>
                    <option value="red_vest" data-price="500">red vest</option>
                </optgroup>

                <optgroup label="attachment">
                    <option value="Suppressor" data-price="15.000">Suppressor</option>
                    <option value="Tactical_Suppressor" data-price="15.000">Tactical Suppressor</option>
                    <option value="Short_Suppressor" data-price="15.000">Short Suppressor</option>
                    <option value="Extended_Pistol_Clip" data-price="5.000">Extended Pistol Clip</option>
                    <option value="Extended_SMG_Clip" data-price="10.000">Extended SMG Clip</option>
                    <option value="Extended_Rifle_Clip" data-price="25.000">Extended Rifle Clip</option>
                    <option value="SMG_Drum" data-price="15.000">SMG Drum</option>
                    <option value="Rifle_Drum" data-price="30.000">Rifle Drum</option>
                    <option value="X17_Drum" data-price="25.000">X17 Drum</option>
                    <option value="Macro_Scope" data-price="5.000">Macro Scope</option>
                    <option value="Medium_Scope" data-price="5.000">Medium Scope</option>
                    <option value="Holo_Scope" data-price="5.000">Holo Scope</option>
                    <option value="Tactical_Flashlight" data-price="5.000">Tactical Flashlight</option>
                    <option value="Grip" data-price="5.000">Grip</option>
                </optgroup>

                <optgroup label="narko">
                    <option value="weed" data-price="2.500">weed 5/pcs</option>
                    <option value="math" data-price="3.000">math 5/pcs</option>
                    <option value="cocain" data-price="3.500">cocain 5/pcs</option>
                </optgroup>
            </select>

            <br><br>

            <button class="tambah" type="button" onclick="addToCart()">+</button>

            <input type="number" id="qty" value="1" min="1" style="width: 60px;">
            
            <button class="kurang" type="button" onclick="removeFromCart()">-</button>
        </form>
    </div>

    <h2>Keranjang</h2>
    <table class="tabel" border="3">
        <thead>
            <tr>
                <th>No</th>
                <th>Nama Barang</th>
                <th>Jumlah</th>
                <th>Harga Satuan</th>
                <th>Total Harga</th>
            </tr>
        </thead>
        <tbody id="itemList"></tbody>
    </table>

    <h3>Total Pesanan: <span id="totalCart">0</span></h3>

    <script>
        var cartItems = {};

        function addToCart() {
            var select = document.getElementById('barang');
            var item = select.options[select.selectedIndex].text;
            var price = select.options[select.selectedIndex].dataset.price;
            var qty = parseInt(document.getElementById('qty').value) || 1;

            if (cartItems[item]) {
                cartItems[item].quantity += qty;
            } else {
                cartItems[item] = { price: price, quantity: qty };
            }

            updateCartDisplay();
        }

        function removeFromCart() {
            var select = document.getElementById('barang');
            var item = select.options[select.selectedIndex].text;
            var qty = parseInt(document.getElementById('qty').value) || 1;

            if (cartItems[item]) {
                cartItems[item].quantity -= qty;
                if (cartItems[item].quantity <= 0) {
                    delete cartItems[item];
                }
            }

            updateCartDisplay();
        }

        function updateCartDisplay() {
            var tbody = document.getElementById('itemList');
            tbody.innerHTML = '';
            var rowNum = 1;
            var grandTotal = 0;

            for (var item in cartItems) {
                var itemData = cartItems[item];
                var quantity = itemData.quantity;
                var price = itemData.price;

                var totalPrice = parseFloat(price.replace('.', '')) * quantity;
                grandTotal += totalPrice;

                var row = tbody.insertRow();
                row.insertCell(0).innerHTML = rowNum;
                row.insertCell(1).innerHTML = item;
                row.insertCell(2).innerHTML = quantity;
                row.insertCell(3).innerHTML = price;
                row.insertCell(4).innerHTML = totalPrice.toLocaleString('id-ID');

                rowNum++;
            }

            document.getElementById('totalCart').innerHTML = grandTotal.toLocaleString('id-ID');
        }
    </script>

    <form>
        <button type="submit">Kirim Pesanan</button>
    </form>

</body>
</html>
